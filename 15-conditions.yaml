- name: Check linux flavoue is redhat or not
  hosts: local
  connection: local
  tasks:
  - name: print facts
    ansible.builtin.debug:
      msg: "ansible_facts"

  - name : check the linux flavor is Redhat or not
    ansible.builtin.debug:
      msg: "Os family is Redhat"
    when: ansible_facts.os_family == "RedHat"