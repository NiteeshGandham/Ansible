- name: Variable preferences
  hosts: local
  connection: local
  vars:
    NAME: "Niteesh Gandham from Play level"
  vars_files:
    - course.yaml
  vars_prompt:
    - name: NAME
      prompt: Please enter your name
      private: false
  tasks:
    - name: name from Task level variables
      vars:
        NAME: Niteesh Gandham from task level
      ansible.builtin.debug:
        msg: "Hi, This is {{ NAME }}"
    
  
#Preferances of variables
  #Args
  #Task
  #file
  #prompt
  #play
  #inventory
