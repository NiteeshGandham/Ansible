- name: Demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible
    tag_list: 
        Course1: linux,
        Course2: shell,
        Course3: ansible
  

  tasks:
  - name: Convert string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"

  - name: convert list to map
    ansible.builtin.debug:
      msg: "tag_list | dict2items"
