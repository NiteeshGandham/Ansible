- name: instaling the software uisng loop
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: installing and removing the softwares
    ansible.builtin.package:
      name: {{ item.name }}
      state: {{ item.state }}
    loop:
    - { name: "mysql", state: "absent" }
    - { name: "nginx", state: "absent" }
    - { name: "zip", state: "absent" }
  