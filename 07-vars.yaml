- name: vars from users
  hosts: local
  connection: local
  vars_prompt:
  - name: username
    prompt: "Please enter username"
    private: false

  - name: password
    prompt: "Please enter password"
    private: true

  tasks:
  - name: vars from the user
    ansible.builtin.debug:
      msg: "user name is: {{ username }}, Password is {{ password }}"
